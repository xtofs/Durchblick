name: .NET Tool

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Durchblick.slnx

      - name: Build tool
        run: dotnet build src/Durchblick.Tool/Durchblick.Tool.csproj --configuration Debug --no-restore

      - name: Test
        run: dotnet test tests/Durchblick.Tests/Durchblick.Tests.csproj --configuration Debug --no-restore
